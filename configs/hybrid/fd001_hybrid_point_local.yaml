paths:
  project_root: "../.."
  tcn_module_root: "../../tcn_core"
  tcn_config: "../tcn/fd001_tcn_point_tuned.yaml"
  tcn_checkpoint: "${TCN_CHECKPOINT:-}"
  tcn_predictions_json: "${TCN_PREDICTIONS_JSON:-}"
  timeomni_model_dir: "${TIMEOMNI_MODEL_DIR:-}"
  output_dir: "${HYBRID_OUTPUT_DIR:-../../artifacts/hybrid/fd001_point_demo}"

runtime:
  device: "auto"
  default_limit: 5

analysis:
  history_cycles: 12
  top_k_features: 5

reasoning:
  enable_timeomni: false
  export_prompts: true
  system_prompt: |
    You are a senior reliability engineer.
    You will receive:
    1. A TCN-based RUL prediction.
    2. A concise summary of recent sensor behavior.
    3. Explicit warning thresholds and action-window rules.

    Produce a maintenance-oriented answer using exactly these tags:
    <risk_summary>...</risk_summary>
    <maintenance_action>...</maintenance_action>
    <key_evidence>...</key_evidence>
    <follow_up_checks>...</follow_up_checks>
    <confidence_note>...</confidence_note>

    Requirements:
    - Ground every section in the provided numbers. Mention predicted RUL, warning level, and at least two sensor names when relevant.
    - Explicitly repeat the given warning level in <risk_summary> or <confidence_note>.
    - Mention at least two sensor names selected from the provided recent feature trends.
    - Use only the thresholds and action rules given in the input. Do not invent any extra threshold.
    - If the input gives a recommended action window for the current warning level, follow it unless you explicitly explain a stricter choice from the provided numbers.
    - Do not output <thought>, chain-of-thought, hidden reasoning, or any internal analysis.
    - Do not repeat the prompt wording or reuse the same sentence template across cases.
    - Avoid generic phrases like "closely monitor" unless you also state what to monitor and why.
    - In <maintenance_action>, state a concrete action window such as immediate, next 10 cycles, next 20 cycles, or routine monitoring.
    - In <maintenance_action>, explicitly write one of: immediate, next 10 cycles, next 20 cycles, routine monitoring.
    - If you mention a stricter future action, put it in <follow_up_checks> and make it explicitly conditional using words such as "if" or "when".
    - In <confidence_note>, explain confidence from the available evidence instead of vague judgement.
    - Output only the five tags and their contents. No extra wrapper tags, markdown fences, bullet titles, or preamble.
  max_new_tokens: 768
  temperature: 0.0
  top_p: 1.0
  repetition_penalty: 1.05
